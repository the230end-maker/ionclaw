name: ionclaw_runner
description: IonClaw - AI Agent Orchestrator
publish_to: 'none'
version: 1.0.7+8

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ionclaw:
    path: ../plugin
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.1
  package_info_plus: ^9.0.0
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0
  get: ^4.7.2
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.0
  share_plus: ^12.0.1
  objective_c: 9.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo-dark.png
